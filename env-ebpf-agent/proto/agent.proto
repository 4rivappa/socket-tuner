syntax = "proto3";

package agent;

option go_package = "socket-tuner/env-ebpf-agent/pkg/pb;pb";

service EnvAgent {
    // Reset the environment: prepare a new network command scenario
    rpc Reset (ResetRequest) returns (ResetResponse);
    
    // Take an action: apply eBPF socket tuning and return resulting metrics
    rpc Step (StepRequest) returns (StepResponse);
}

message ResetRequest {
    // The network command to execute, e.g., "curl -sS https://example.com"
    string command = 1;
}

message ResetResponse {
    bool success = 1;
    string message = 2;
    string session_id = 3;
    // Baseline observation from untuned run (so RL model has initial state)
    Observation observation = 4;
}

message StepRequest {
    string session_id = 1;

    // Action variables from RL model
    uint32 max_pacing_rate = 2; // pacing rate in bytes per second
    uint32 snd_cwnd_clamp = 3;  // congestion window clamp
    
    // Advanced tuning options
    string cong_algo = 4;       // e.g. "bbr", "cubic", "reno"
    uint32 init_cwnd = 5;       // initial congestion window
    uint32 window_clamp = 6;    // max receive window clamp
    bool no_delay = 7;          // TCP_NODELAY (Nagle algorithm)
}

message StepResponse {
    // True if the network command has completed
    bool done = 1;
    Observation observation = 2;
}

message Observation {
    // Resolved from kernel socket (not DNS)
    string remote_ip = 1;
    uint32 remote_port = 2;
    
    // Metrics captured via eBPF
    uint32 srtt_us = 3;        // Smoothed RTT in microseconds
    uint32 total_retrans = 4;  // Total retransmissions
    uint64 bytes_sent = 5;     // Total bytes sent
    uint64 bytes_received = 6; // Total bytes received
    uint64 duration_us = 7;    // Connection duration in microseconds
}
