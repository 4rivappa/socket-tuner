apiVersion: v1
kind: ServiceAccount
metadata:
  name: agents-sa
  namespace: socket-tuner
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents
  namespace: socket-tuner
  labels:
    app: agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agents
  template:
    metadata:
      labels:
        app: agents
    spec:
      hostNetwork: true
      hostPID: true
      serviceAccountName: agents-sa
      tolerations:
        - key: "socket-tuner/agent"
          operator: "Equal"
          value: "true"
          effect: "NoSchedule"
      nodeSelector:
        instance: env-agent-node
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: agents
              topologyKey: kubernetes.io/hostname
      containers:
        - name: env-ebpf-agent
          image: 786221173676.dkr.ecr.us-east-1.amazonaws.com/socket-tuner-env-ebpf-agent:prod-safeguard-0.1.0
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50061
              protocol: TCP
          securityContext:
            privileged: true
            capabilities:
              add:
                - NET_ADMIN
                - SYS_ADMIN
                - BPF
          volumeMounts:
            - name: bpf-fs
              mountPath: /sys/fs/bpf
            - name: cgroup
              mountPath: /sys/fs/cgroup
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
          readinessProbe:
            tcpSocket:
              port: 50061
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50061
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: bpf-fs
          hostPath:
            path: /sys/fs/bpf
            type: Directory
        - name: cgroup
          hostPath:
            path: /sys/fs/cgroup
            type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: agents-service
  namespace: socket-tuner
  labels:
    app: agents
spec:
  clusterIP: None
  selector:
    app: agents
  ports:
    - name: grpc
      port: 50061
      targetPort: 50061
      protocol: TCP
