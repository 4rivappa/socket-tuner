apiVersion: v1
kind: ServiceAccount
metadata:
  name: router-sa
  namespace: socket-tuner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: router-cr
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/scale", "services"]
    verbs: ["get", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: router-crb
subjects:
  - kind: ServiceAccount
    name: router-sa
    namespace: socket-tuner
roleRef:
  kind: ClusterRole
  name: router-cr
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
  namespace: socket-tuner
  labels:
    app: router
spec:
  replicas: 1
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
    spec:
      serviceAccountName: router-sa
      nodeSelector:
        eks.amazonaws.com/nodegroup: default-system-nodes
      containers:
        - name: env-router
          image: 786221173676.dkr.ecr.us-east-1.amazonaws.com/socket-tuner-env-router:prod-safeguard-0.1.1
          imagePullPolicy: Always
          ports:
            - name: grpc
              containerPort: 50050
              protocol: TCP
          env:
            - name: AGENT_SERVICE_NAME
              value: "agents-service"
            - name: AGENT_NAMESPACE
              value: "socket-tuner"
            - name: AGENT_DEPLOYMENT_NAME
              value: "agents"
            - name: AGENT_GRPC_PORT
              value: "50061"
            - name: WARM_POOL_SIZE
              value: "1"
            - name: SCALER_INTERVAL_SECONDS
              value: "10"
            - name: LISTEN_ADDR
              value: ":50050"
          resources:
            requests:
              cpu: "250m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            tcpSocket:
              port: 50050
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 50050
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: router-service
  namespace: socket-tuner
  labels:
    app: router
spec:
  type: LoadBalancer
  selector:
    app: router
  ports:
    - name: grpc
      port: 50050
      targetPort: 50050
      protocol: TCP
