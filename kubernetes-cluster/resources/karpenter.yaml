apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: env-agents
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - id: ami-038307b5108a3e3dd
  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: socket-tuner
  
  # NEED TO UPDATE BELOW TWO PARAMETERS
  role: KarpenterNodeRole-socket-tuner
  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: socket-tuner

  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
        snapshotID: snap-04e9a2c7e7af1aeee
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  tags:
    name: env-agent-node
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: env-agents
spec:
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
  limits:
    cpu: "12"
  template:
    metadata:
      labels:
        instance: env-agent-node
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: env-agents
      expireAfter: 30d
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.micro
