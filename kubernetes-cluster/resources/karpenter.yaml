apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: env-agents
spec:
  amiFamily: AL2023
  amiSelectorTerms:
    - id: ami-0a3271c34f36aa212
  subnetSelectorTerms:
    - tags:
        alpha.eksctl.io/cluster-name: socket-tuner
  role: KarpenterNodeRole-socket-tuner
  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/socket-tuner: owned
  blockDeviceMappings:
    - deviceName: /dev/xvda
      ebs:
        volumeSize: 30Gi
        volumeType: gp3
        encrypted: true
        deleteOnTermination: true
        snapshotID: snap-0b7d5980eb82e5497
  metadataOptions:
    httpEndpoint: enabled
    httpProtocolIPv6: disabled
    httpPutResponseHopLimit: 2
    httpTokens: required
  tags:
    name: env-agent-node
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: env-agents
spec:
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
  limits:
    cpu: "12"
  template:
    metadata:
      labels:
        instance: env-agent-node
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: env-agents
      taints:
        - key: socket-tuner/agent
          value: "true"
          effect: NoSchedule
      expireAfter: 240h
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values:
            - t3.micro
---
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: general
spec:
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 5m
  limits:
    cpu: "4"
  template:
    metadata:
      labels:
        instance: general
    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: env-agents
      expireAfter: 720h
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["spot", "on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["t3.medium"]
